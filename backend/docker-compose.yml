version: '3.8'

services:
  # NEONEXUS Backend API
  neonexus-backend:
    build: .
    container_name: neonexus-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgres://neonexus:${POSTGRES_PASSWORD}@postgres:5432/neonexus
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - neonexus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ML Service (FastAPI)
  ml-service:
    build: ../ml-service
    container_name: neonexus-ml-service
    ports:
      - "8000:8000"
    networks:
      - neonexus-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  # PostgreSQL Database (for production)
  postgres:
    image: postgres:15-alpine
    container_name: neonexus-postgres
    environment:
      - POSTGRES_DB=neonexus
      - POSTGRES_USER=neonexus
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - neonexus-network
    restart: unless-stopped

  # Redis for session management and caching
  redis:
    image: redis:7-alpine
    container_name: neonexus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - neonexus-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: neonexus-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - neonexus-backend
    networks:
      - neonexus-network
    restart: unless-stopped

networks:
  neonexus-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: